name: CD

on: 
    # Trigger the workflow on pushes to the main branch
    # TODO: make it depend on ci passing
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    # manual trigger
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: cd
    cancel-in-progress: false

jobs:
    migrate:
        name: Run EF Core migrations
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: ./server
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: 10.0.x

        - name: Restore dependencies
          run: dotnet restore ./server.slnx

        - name: Install dotnet-ef
          run: dotnet tool install --global dotnet-ef --version 10.*

        - name: Add dotnet tools to PATH
          run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

        - name: Apply migrations to production database
          env:
            ConnectionStrings__DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          run: dotnet ef database update --context AppDbContext --project Infrastructure --startup-project Api

    deploy-api:
        name: Deploy API to Fly
        runs-on: ubuntu-latest
        needs: migrate
        defaults:
          run:
            working-directory: ./server
        steps:
        - uses: actions/checkout@v4
        - uses: superfly/flyctl-actions/setup-flyctl@master
        - run: flyctl deploy -c ../fly/api.toml --remote-only
          env:
            FLY_API_TOKEN: ${{ secrets.API_CD_TOKEN }}

    deploy-python:
        name: Deploy Python to Fly
        runs-on: ubuntu-latest
        needs: migrate
        defaults:
          run:
            working-directory: ./python
        steps:
        - uses: actions/checkout@v4
        - uses: superfly/flyctl-actions/setup-flyctl@master
        - run: flyctl deploy -c ../fly/python.toml --remote-only
          env:
            FLY_API_TOKEN: ${{ secrets.PYTHON_CD_TOKEN }}

