name: CI

on:
    # Trigger the workflow on pushes to the main branch
    push:
        branches:
            - main
    # Trigger the workflow on pull requests to the main branch
    pull_request:
        branches:
            - main
    # manual trigger
    workflow_dispatch:

permissions:
    contents: read

jobs:
    # .net server
    dotnet:
        name: Dotnet Build and Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                    dotnet-version: 10.0.x

            - name: Restore dependencies
              run: dotnet restore ./server/server.slnx

            - name: Build
              run: dotnet build ./server/server.slnx --configuration Release --no-restore --verbosity normal

            - name: Test
              run: dotnet test ./server/Domain.UnitTests/Domain.UnitTests.csproj --configuration Release --no-build --verbosity normal